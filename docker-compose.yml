# Local development dependencies. Start DynamoDB Local with:
#   docker compose up -d dynamodb
#
# The app (application.yml -> ensemble.dynamodb.endpoint) points at
# http://localhost:8000 and auto-creates the table on startup.
services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: ensemble-dynamodb
    # root avoids host/volume permission issues writing the shared-db file.
    user: root
    ports:
      - "8000:8000"
    working_dir: /home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    volumes:
      - ensemble-dynamodb-data:/home/dynamodblocal/data

volumes:
  ensemble-dynamodb-data:
